name: Container Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  container-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman
    
    - name: Run container test
      run: ./test-container.sh
