name: release

on:
  push:
    tags:
      - v*

env:
  RUST_ANALYZER_VERSION: "2026-05-18"

jobs:
  release-tarballs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - name: Build tarball
        run: |
          set -eux
          STAGE=stage/scip-rust
          mkdir -p "$STAGE"
          curl -fL "https://github.com/rust-lang/rust-analyzer/releases/download/${RUST_ANALYZER_VERSION}/rust-analyzer-${{ matrix.target }}.gz" \
            | gunzip > "$STAGE/rust-analyzer"
          chmod +x "$STAGE/rust-analyzer"
          install -m 755 scip-rust "$STAGE/scip-rust"
          tar -C stage -czf "scip-rust-${{ matrix.target }}.tar.gz" scip-rust
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: scip-rust-${{ matrix.target }}.tar.gz

  release-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: docker/setup-buildx-action@v1
      - run: echo "PATCH=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
      - run: echo "MINOR=${PATCH%.*}" >> $GITHUB_ENV
      - run: echo "MAJOR=${MINOR%.*}" >> $GITHUB_ENV
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: |
            sourcegraph/scip-rust:latest
            sourcegraph/scip-rust:${{ env.PATCH }}
            sourcegraph/scip-rust:${{ env.MINOR }}
            sourcegraph/scip-rust:${{ env.MAJOR }}
